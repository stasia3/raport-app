<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dispatcher — Postări</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
    <body>

        <div class="app-layout">

            <!-- ═══ SIDEBAR ═══ -->
            <aside class="sidebar">
                <div class="sidebar-logo">
                    <div class="sidebar-mark">CR</div>
                    <span class="sidebar-brand-name">CivicReport</span>
                </div>

                <ul class="sidebar-nav">
                    <li>
                        <a th:href="@{/feed}" class="active">
                            <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/>
                                <rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/>
                            </svg>
                            <span>Feed</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
                                <path d="M9 2C6.79 2 5 3.79 5 6c0 3.5 4 10 4 10s4-6.5 4-10c0-2.21-1.79-4-4-4z"/>
                                <circle cx="9" cy="6" r="1.5"/>
                            </svg>
                            <span>Hartă</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
                                <path d="M3 4h12M3 8h8M3 12h10"/>
                            </svg>
                            <span>Postările mele</span>
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="9" cy="9" r="2.5"/>
                                <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.4 3.4l1.4 1.4M13.2 13.2l1.4 1.4M3.4 14.6l1.4-1.4M13.2 4.8l1.4-1.4"/>
                            </svg>
                            <span>Setări</span>
                        </a>
                    </li>

                    <li class="nav-sep" role="separator"></li>

                    <li th:if="${!isAuthenticated}">
                        <a th:href="@{/login}">
                            <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M9 2.5a3 3 0 1 1 0 6a3 3 0 0 1 0-6Z"/>
                                <path d="M3 15c.8-2.2 3-3.5 6-3.5s5.2 1.3 6 3.5"/>
                            </svg>
                            <span>Autentificare</span>
                        </a>
                    </li>

                    <li th:if="${isAuthenticated}">
                        <form th:action="@{/logout}" method="post" class="sidebar-logout-form">
                            <button type="submit" class="sidebar-logout-btn">
                                <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M7 3H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h4"/>
                                    <path d="M11 12l3-3-3-3"/>
                                    <path d="M6 9h8"/>
                                </svg>
                                <span>Ieșire</span>
                            </button>
                        </form>
                    </li>


                </ul>

                <div class="sidebar-user" th:if="${isAuthenticated}">
                    <div class="user-avatar">IP</div>
                    <div class="user-info">
                        <div class="user-name" th:text="${currentUsername}">Ion Popescu</div>
                        <div class="user-role">Dispatcher</div>
                    </div>
                </div>
                <div class="sidebar-user" th:unless="${isAuthenticated}">
                    <div class="user-avatar">?</div>
                    <div class="user-info">
                        <div class="user-name">Vizitator</div>
                        <div class="user-role">Neautentificat</div>
                    </div>
                </div>
            </aside>

            <!-- ═══ MAIN CONTENT ═══ -->
            <div class="main-content">

                <div class="create-container">
                    <h2>Postări pentru dispatcher</h2>

                    <div th:if="${error}" style="color:#D9534F; margin-bottom:16px;">
                        <span th:text="${error}"></span>
                    </div>

                    <article class="post-card" th:each="post : ${posts}">
                        <div class="post-body">
                            <div class="post-meta-top">
                                <span class="post-tag" th:text="${post.problemTag}">Tag</span>
                                <span class="post-location" th:text="${post.street + ', ' + post.city}">Locație</span>
                            </div>

                            <h3 class="post-title" th:text="${post.title}">Titlu</h3>
                            <p class="post-desc" th:text="${post.description}">Descriere</p>

                            <div th:if="${post != null and post.ticket == null}" style="margin-top: 14px;">
                                <form th:action="@{/dispatcher/posts/{id}/take(id=${post.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-primary">Preia postarea</button>
                                </form>
                            </div>

                            <div th:if="${post != null and post.ticket != null}" style="margin-top: 14px;">
                                <div style="margin-bottom: 10px;">
                                    <strong>Ticket:</strong>
                                    <span th:text="${post.ticket.ticketNumber}">TCK-2026-1</span>
                                </div>

                                <div style="margin-bottom: 10px;">
                                    <strong>Status curent:</strong>
                                    <span th:text="${post.ticket.status}">Sesizat</span>
                                </div>

                                <div th:if="${post.ticket.assignedInstitutionUser != null}" style="margin-bottom: 10px;">
                                    <strong>Instituție asignată:</strong>
                                    <span th:text="${post.ticket.assignedInstitutionUser.email}">institutie@email.com</span>
                                </div>

                                <form th:action="@{/dispatcher/tickets/{id}/status(id=${post.ticket.id})}" method="post" style="margin-bottom: 12px;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                    <select name="status">
                                        <option th:each="status : ${ticketStatuses}"
                                                th:value="${status}"
                                                th:text="${status}"
                                                th:selected="${status == post.ticket.status}">
                                        </option>
                                    </select>

                                    <button type="submit" class="btn btn-secondary">Actualizează statusul</button>
                                </form>

                                <form th:action="@{/dispatcher/tickets/{id}/assign(id=${post.ticket.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                    <select name="institutionUserId">
                                        <option value="" disabled>Selectează instituția</option>
                                        <option th:each="institution : ${institutionUsers}"
                                                th:value="${institution.id}"
                                                th:text="${institution.email}"
                                                th:selected="${post.ticket.assignedInstitutionUser != null and institution.id == post.ticket.assignedInstitutionUser.id}">
                                        </option>
                                    </select>

                                    <button type="submit" class="btn btn-primary">Asignează instituției</button>
                                </form>
                            </div>
                        </div>
                    </article>
                    </div>

            </div><!-- /main-content -->
        </div>
    </body>
</html>
