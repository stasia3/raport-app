<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
    <link rel="stylesheet" th:href="@{/css/styles_admin.css}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1f1f1f;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #4CAF50;
        }

        a, button {
            text-decoration: none;
            cursor: pointer;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            color: white;
            margin-right: 5px;
        }

        .btn-add {
            background-color: #4CAF50;
            margin-bottom: 20px;
        }

        .btn-edit {
            background-color: #3498db;
        }

        .btn-delete {
            background-color: #D9534F;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #2a2a2a;
        }

        th, td {
            padding: 12px;
            border: 1px solid #444;
            text-align: left;
        }

        th {
            background-color: #333;
        }
    </style>
</head>
<body>
<a th:href="@{/admin}" class="btn btn-back">Admin Panel</a>

<h1>Users</h1>

<a th:href="@{/users/new}" class="btn btn-add">Add User</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Role</th>
        <th>Last Login</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.userRole}"></td>
        <td th:text="${user.lastLogin}"></td>
        <td>
            <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-edit">Edit</a>
            <a th:href="@{/users/delete/{id}(id=${user.id})}" class="btn btn-delete">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
