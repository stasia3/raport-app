<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Dispatcher</title>
    <link rel="stylesheet" th:href="@{/css/styles_admin.css}">
</head>
<body>

<div class="container">
    <h1>Add Dispatcher</h1>

    <form th:action="@{/dispatchers/create}" th:object="${dispatcher}" method="post">

        <label>User</label>
        <select name="selectedUserId" required>
            <option value="">Select user</option>
            <option th:each="u : ${users}"
                    th:value="${u.id}"
                    th:text="${u.email}">
            </option>
        </select>

        <label>Full Name</label>
        <input type="text" th:field="*{fullName}" required>

        <label>Role</label>
        <select th:field="*{role}" required>
            <option value="">Select role</option>
            <option th:each="r : ${roles}"
                    th:value="${r}"
                    th:text="${r}">
            </option>
        </select>

        <label>Access Level</label>
        <input type="number" th:field="*{accessLevel}" min="0" required>

        <button type="submit" class="btn btn-save">Save</button>
        <a th:href="@{/dispatchers}" class="btn btn-back">Back</a>
    </form>
</div>

</body>
</html>
