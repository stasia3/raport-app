<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dispatchers</title>
    <link rel="stylesheet" th:href="@{/css/styles_admin.css}">
</head>
<body>

<div class="container">
    <h1>Dispatchers</h1>

    <a th:href="@{/dispatchers/new}" class="btn btn-add">Add Dispatcher</a>
    <a th:href="@{/admin}" class="btn btn-back">Admin Panel</a>

    <table>
        <thead>
        <tr>
            <th>User ID</th>
            <th>Email</th>
            <th>Full Name</th>
            <th>Role</th>
            <th>Access Level</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="d : ${dispatchers}">
            <td th:text="${d.userId}"></td>
            <td th:text="${d.user != null ? d.user.email : ''}"></td>
            <td th:text="${d.fullName}"></td>
            <td th:text="${d.role}"></td>
            <td th:text="${d.accessLevel}"></td>
            <td>
                <a th:href="@{/dispatchers/edit/{id}(id=${d.userId})}" class="btn btn-edit">Edit</a>
                <a th:href="@{/dispatchers/delete/{id}(id=${d.userId})}" class="btn btn-delete">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
