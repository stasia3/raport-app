<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Persoana Fizica</title>
</head>
<body>

<h1>Add Persoana Fizica</h1>

<form th:action="@{/persoane-fizice/create}" th:object="${persoanaFizica}" method="post">
    <label>User</label>
    <select name="selectedUserId" required>
        <option value="">Select user</option>
        <option th:each="u : ${users}"
                th:value="${u.id}"
                th:text="${u.email}">
        </option>
    </select>

    <label>First Name</label>
    <input type="text" th:field="*{firstName}" required>

    <label>Last Name</label>
    <input type="text" th:field="*{lastName}" required>

    <label>Phone Number</label>
    <input type="text" th:field="*{phoneNumber}">

    <label>Karma Points</label>
    <input type="number" th:field="*{karmaPoints}" required>

    <label>User Type</label>
    <select th:field="*{userType}" required>
        <option value="">Select type</option>
        <option th:each="type : ${userTypes}"
                th:value="${type}"
                th:text="${type}">
        </option>
    </select>

    <button type="submit">Save</button>
    <a th:href="@{/persoane-fizice}">Back</a>
</form>

</body>
</html>
