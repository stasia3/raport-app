<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Persoane Fizice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1f1f1f;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #4CAF50;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            color: white;
            text-decoration: none;
            margin-right: 5px;
        }

        .btn-add {
            background-color: #4CAF50;
            margin-bottom: 20px;
        }

        .btn-edit {
            background-color: #3498db;
        }

        .btn-delete {
            background-color: #D9534F;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #2a2a2a;
        }

        th, td {
            padding: 12px;
            border: 1px solid #444;
            text-align: left;
        }

        th {
            background-color: #333;
        }
    </style>
</head>
<body>
<a th:href="@{/admin}" class="btn btn-back">Admin Panel</a>

<h1>Persoane Fizice</h1>

<a th:href="@{/persoane-fizice/new}" class="btn btn-add">Add Persoana Fizica</a>

<table>
    <thead>
    <tr>
        <th>User ID</th>
        <th>Email</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Phone Number</th>
        <th>Karma Points</th>
        <th>User Type</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${persoane}">
        <td th:text="${p.userId}"></td>
        <td th:text="${p.user != null ? p.user.email : ''}"></td>
        <td th:text="${p.firstName}"></td>
        <td th:text="${p.lastName}"></td>
        <td th:text="${p.phoneNumber}"></td>
        <td th:text="${p.karmaPoints}"></td>
        <td th:text="${p.userType}"></td>
        <td>
            <a th:href="@{/persoane-fizice/edit/{id}(id=${p.userId})}" class="btn btn-edit">Edit</a>
            <a th:href="@{/persoane-fizice/delete/{id}(id=${p.userId})}" class="btn btn-delete">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
