<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Post Form</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/styles_admin.css}">
</head>
<body>
<h1 th:text="${post.id == null} ? 'Adaugă postare' : 'Editează postare'"></h1>

<div th:if="${error}" th:text="${error}" style="color:red;"></div>

<form th:action="@{/admin/posts/save}" th:object="${post}" method="post">
    <input type="hidden" th:field="*{id}" />

    <div>
        <label for="creatorId">Creator:</label>
        <select id="creatorId" name="creatorId" required>
            <option value="">-- Selectează creatorul --</option>
            <option th:each="creator : ${creators}"
                    th:value="${creator.userId}"
                    th:text="${creator.firstName + ' ' + creator.lastName + ' (#' + creator.userId + ')'}"
                    th:selected="${post.creator != null and post.creator.userId == creator.userId}">
            </option>
        </select>
    </div>

    <div>
        <label for="title">Title:</label>
        <input type="text" id="title" th:field="*{title}" required />
    </div>

    <div>
        <label for="description">Description:</label>
        <textarea id="description" th:field="*{description}" required></textarea>
    </div>

    <div>
        <label for="problemTag">Problem Tag:</label>
        <input type="text" id="problemTag" th:field="*{problemTag}" required />
    </div>

    <div>
        <label for="city">City:</label>
        <input type="text" id="city" th:field="*{city}" required />
    </div>

    <div>
        <label for="street">Street:</label>
        <input type="text" id="street" th:field="*{street}" required />
    </div>

    <div>
        <label for="gpsLatitude">GPS Latitude:</label>
        <input type="number" step="any" id="gpsLatitude" th:field="*{gpsLatitude}" required />
    </div>

    <div>
        <label for="gpsLongitude">GPS Longitude:</label>
        <input type="number" step="any" id="gpsLongitude" th:field="*{gpsLongitude}" required />
    </div>

    <div>
        <label for="isAnonymous">Anonymous:</label>
        <input type="checkbox" id="isAnonymous" th:field="*{isAnonymous}" />
    </div>

    <div th:if="${post.createdAt != null}">
        <label>Created At:</label>
        <span th:text="${post.createdAt}"></span>
    </div>

    <div>
        <button type="submit">Salvează</button>
        <a th:href="@{/admin/posts}">Înapoi</a>
    </div>
</form>
</body>
</html>
